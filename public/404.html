<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <script>
    // GitHub Pages SPA redirect: preserve path + query so React Router can handle it
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 2).join('/') +
      '/?p=' + encodeURIComponent(l.pathname.slice(1) + l.search) +
      (l.hash ? '&h=' + encodeURIComponent(l.hash.slice(1)) : '')
    );
  </script>
</head>
<body></body>
</html>
